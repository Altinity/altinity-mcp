apiVersion: v2
name: ch-jwt-verify
description: |
  ClickHouse-side JWT verifier sidecar for altinity-mcp.

  Deploy as a colocated container in each ClickHouse pod (StatefulSet or
  Deployment), reachable over loopback (127.0.0.1) or a shared Unix socket.
  Altinity MCP routes per-query OAuth bearers via `Authorization: Basic
  base64(email:JWT)` and ClickHouse's <http_authentication> handler invokes
  the sidecar to validate them. The sidecar is the only cryptographic gate;
  altinity-mcp itself is a pure forwarder.
type: application
version: 0.1.0
appVersion: "0.1.0"
