# Default values for ch-jwt-verify.
#
# The chart renders three things you can pull into the host CH chart:
#   - ConfigMap with the sidecar's YAML config
#   - ConfigMap with the CH-side <http_authentication_servers> XML snippet
#     to drop into config.d/
#   - A reusable container fragment (helper template) you reference from your
#     CH StatefulSet's `spec.template.spec.containers` list.
#
# The chart does NOT render a StatefulSet/Deployment — the sidecar must live
# in the same pod as ClickHouse for the loopback trust model to hold.

image:
  repository: ghcr.io/altinity/ch-jwt-verify
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# -- Sidecar listener. Pick exactly one of unix or tcp. Unix is preferred:
# zero port surface, fs permissions gate access. Use TCP when bind-mounted
# sockets are awkward (e.g. some managed CH operators).
#
# NOTE on tcp bind address: 0.0.0.0 is required even for the colocated-only
# trust model. The kubelet's HTTP probe targets the pod IP (eth0), not
# loopback inside the netns — a server bound to 127.0.0.1 won't answer the
# probe and the kubelet will CrashLoop the container. Since no Service
# exposes this port for colocated deployments, 0.0.0.0 has no external
# effect. See docs/ch-jwt-verify.md § Sidecar binding gotcha.
listen:
  unix: ""                      # e.g. /run/ch-jwt-verify/sock
  tcp: "0.0.0.0:9999"

oauth:
  # -- Upstream OAuth issuer (Auth0/Google/etc.) — used to discover the JWKS
  # and as the expected `iss` claim.
  issuer: ""
  # -- Pinned JWKS URL. Set this to avoid an extra discovery hop on cold start.
  jwks_url: ""
  # -- Expected `aud` claim. Byte-equal match per RFC 8707.
  audience: ""
  # -- Scopes a token must carry to pass (token's scopes must be a superset).
  required_scopes: []
  jwks_cache_ttl: 5m
  jwks_refresh_ahead: 1m

identity:
  # -- Which JWT claim is matched against the Basic-auth user half. `email`
  # for OIDC-style deployments, `sub` for opaque principals.
  username_claim: email
  # -- Comparison mode. `lowercase_equal` (default) tolerates case differences
  # common when operators provision CH users in lowercase.
  match_mode: lowercase_equal
  # -- Reject tokens with email_verified=false.
  require_email_verified: true
  # -- Optional email-domain allow-list (e.g. ["altinity.com"]).
  allowed_email_domains: []
  # -- Optional hosted/workspace domain allow-list (Google `hd`).
  allowed_hosted_domains: []

# -- Map an OAuth scope to ClickHouse session settings the sidecar returns to
# CH. CH applies these for the duration of the authenticating query only.
settings_from_scope: {}
  # mcp:read:
  #   readonly: "1"
  # mcp:write: {}

cache:
  positive_ttl: 30s
  negative_ttl: 5m

# -- Container resource requests/limits.
resources: {}

# -- Reference into the CH StatefulSet to drop the http_authentication_servers
# XML at the right path. The chart renders a ConfigMap; the operator mounts
# it into /etc/clickhouse-server/config.d/ in the CH container.
ch:
  # Name of the http_authentication server entry CH picks up. Per-user
  # bindings look like:
  #   CREATE USER `alice@example.com`
  #     IDENTIFIED WITH http SERVER 'ch_jwt_verify' SCHEME 'BASIC'
  #     DEFAULT ROLE mcp_reader;
  # (CH grammar token is `http`, not `http_authenticator` — the latter
  # is rejected with SYNTAX_ERROR.)
  serverName: ch_jwt_verify
  # The URL CH uses to reach the sidecar over loopback. Must match `listen`.
  url: "http://127.0.0.1:9999/verify"
