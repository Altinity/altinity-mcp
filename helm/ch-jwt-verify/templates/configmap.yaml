apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ch-jwt-verify.fullname" . }}-config
  labels: {{- include "ch-jwt-verify.labels" . | nindent 4 }}
data:
  config.yaml: |
    listen:
      {{- if .Values.listen.unix }}
      unix: {{ .Values.listen.unix | quote }}
      {{- else }}
      tcp: {{ .Values.listen.tcp | quote }}
      {{- end }}
    oauth:
      issuer: {{ .Values.oauth.issuer | quote }}
      jwks_url: {{ .Values.oauth.jwks_url | quote }}
      audience: {{ .Values.oauth.audience | quote }}
      required_scopes: {{ toYaml .Values.oauth.required_scopes | nindent 8 }}
      jwks_cache_ttl: {{ .Values.oauth.jwks_cache_ttl | quote }}
      jwks_refresh_ahead: {{ .Values.oauth.jwks_refresh_ahead | quote }}
    identity:
      username_claim: {{ .Values.identity.username_claim | quote }}
      match_mode: {{ .Values.identity.match_mode | quote }}
      require_email_verified: {{ .Values.identity.require_email_verified }}
      allowed_email_domains: {{ toYaml .Values.identity.allowed_email_domains | nindent 8 }}
      allowed_hosted_domains: {{ toYaml .Values.identity.allowed_hosted_domains | nindent 8 }}
    settings_from_scope: {{ toYaml .Values.settings_from_scope | nindent 6 }}
    cache:
      positive_ttl: {{ .Values.cache.positive_ttl | quote }}
      negative_ttl: {{ .Values.cache.negative_ttl | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ch-jwt-verify.fullname" . }}-ch-config
  labels: {{- include "ch-jwt-verify.labels" . | nindent 4 }}
data:
  # Mount this entry into the CH container at
  #   /etc/clickhouse-server/config.d/http_authentication.xml
  # so ClickHouse registers `{{ .Values.ch.serverName }}` as an
  # http_authentication server backend. Then provision users with:
  #   CREATE USER "alice@example.com"
  #     IDENTIFIED WITH http_authenticator SERVER '{{ .Values.ch.serverName }}';
  http_authentication.xml: |
    <clickhouse>
      <http_authentication_servers>
        <{{ .Values.ch.serverName }}>
          <uri>{{ .Values.ch.url }}</uri>
          <forward_headers>
            <header>Authorization</header>
          </forward_headers>
        </{{ .Values.ch.serverName }}>
      </http_authentication_servers>
    </clickhouse>
