# Default values for altinity-mcp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas to deploy
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/altinity/altinity-mcp
  # -- Container image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Pull secrets for private images
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 8080
  # -- Service annotations
  annotations: {}
  # -- Session affinity type. Set to "ClientIP" to enable sticky sessions.
  # sessionAffinity: ClientIP
  # -- Session affinity configuration (only used when sessionAffinity is set)
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800

ingress:
  # -- Enable ingress controller resource
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    # -- Ingress host
    - host: chart-example.local
      paths:
        # -- Ingress path
        - path: /
          # -- Ingress path type
          pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Probe configuration
probes:
  liveness:
    # -- Path for the liveness probe
    path: /livez
    # -- Initial delay before liveness probe starts
    initialDelaySeconds: 7
    # -- How often to perform the liveness probe
    periodSeconds: 30
  readiness:
    # -- Path for the readiness probe
    path: /health
    # -- Initial delay before readiness probe starts
    initialDelaySeconds: 7
    # -- How often to perform the readiness probe
    periodSeconds: 30

# -- Container resource requests and limits
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  # -- Enable autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Node labels for pod assignment
nodeSelector: {}

# -- Toleration labels for pod assignment
tolerations: []

# -- Affinity settings for pod assignment
affinity: {}

# -- Environment variables for the main container (supports `value`, `valueFrom`, etc.).
# The application reads `CLICKHOUSE_PASSWORD` from the environment and it overrides the config file value.
# Example (Kubernetes `secretKeyRef`):
# env:
#   - name: CLICKHOUSE_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: password
env: []

# Configuration for the altinity-mcp application
config:
  clickhouse:
    host: "localhost"
    port: 8123
    database: "default"
    username: "default"
    password: ""
    protocol: "http"
    read_only: false
    max_execution_time: 30
    limit: 1000
    tls:
      enabled: false
      ca_cert: ""
      client_cert: ""
      client_key: ""
      insecure_skip_verify: false
  
  server:
    transport: "http"
    address: "0.0.0.0"
    port: 8080
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_cert: ""
    jwe:
      enabled: false
      jwt_secret_key: ""
      jwe_secret_key: ""
      token_param: "token"
    # -- OAuth 2.0 authentication configuration
    # When enabled, MCP server validates incoming OAuth tokens and can forward them to ClickHouse
    # For ClickHouse token-based authentication, use with ClickHouse Antalya build (25.8+)
    # that supports token_processors in config
    oauth:
      # -- Enable OAuth 2.0 authentication
      enabled: false
      # -- OAuth token issuer URL for validation (e.g., "https://accounts.google.com")
      issuer: ""
      # -- URL to fetch JSON Web Key Set for token validation
      # If empty, will be discovered from issuer's .well-known/openid-configuration
      jwks_url: ""
      # -- Expected audience claim in the token
      audience: ""
      # -- OAuth client ID
      client_id: ""
      # -- OAuth client secret
      client_secret: ""
      # -- OAuth token endpoint URL
      token_url: ""
      # -- OAuth authorization endpoint URL
      auth_url: ""
      # -- OAuth scopes to request
      scopes: []
      # -- Required scopes for access (token must have all of these)
      required_scopes: []
      # -- Header name for forwarding OAuth token to ClickHouse
      # Default: "Authorization" (sends as "Bearer {token}")
      # Set to a custom header name to send raw token without "Bearer " prefix
      clickhouse_header_name: ""
      # -- Map OAuth token claims to ClickHouse HTTP headers
      # Example: {"sub": "X-ClickHouse-User", "email": "X-ClickHouse-Email"}
      claims_to_headers: {}
    # Dynamic tools generated from ClickHouse views
    dynamic_tools: []
    #  - regexp: "db\\..*"
    #    prefix: "custom_"
  
  logging:
    level: "info"
