# Example values for altinity-mcp with OAuth + Google Cloud Identity
# ClickHouse must be configured with token_processors for OpenID:
#
#   <token_processors>
#     <google>
#       <type>OpenID</type>
#       <configuration_endpoint>https://accounts.google.com/.well-known/openid-configuration</configuration_endpoint>
#       <token_cache_lifetime>60</token_cache_lifetime>
#     </google>
#   </token_processors>
#   <user_directories>
#     <token>
#       <processor>google</processor>
#       <common_roles><default_role /></common_roles>
#     </token>
#   </user_directories>

image:
  tag: "main"
  pullPolicy: Always

config:
  clickhouse:
    host: "clickhouse.default.svc.cluster.local"
    port: 8123
    protocol: "http"
    username: "default"
    password: ""
    read_only: true

  server:
    transport: "http"
    oauth:
      enabled: true
      issuer: "https://accounts.google.com"
      audience: "<GOOGLE_CLIENT_ID>.apps.googleusercontent.com"
      client_id: "<GOOGLE_CLIENT_ID>.apps.googleusercontent.com"
      client_secret: "<GOOGLE_CLIENT_SECRET>"
      token_url: "https://oauth2.googleapis.com/token"
      auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
      scopes:
        - "openid"
        - "profile"
        - "email"

  logging:
    level: "info"
