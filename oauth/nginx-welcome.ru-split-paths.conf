# Merge these locations into the existing `welcome.ru` nginx server block.
# Public MCP endpoint: https://welcome.ru/http
# Public OAuth endpoint: https://welcome.ru/oauth

location = /.well-known/oauth-protected-resource/http {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /http;
    proxy_set_header X-Forwarded-OAuth-Prefix /oauth;
    proxy_pass http://192.168.1.155:18080/.well-known/oauth-protected-resource;
}

location = /.well-known/oauth-authorization-server/http {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /http;
    proxy_set_header X-Forwarded-OAuth-Prefix /oauth;
    proxy_pass http://192.168.1.155:18080/.well-known/oauth-authorization-server;
}

location = /.well-known/openid-configuration/http {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /http;
    proxy_set_header X-Forwarded-OAuth-Prefix /oauth;
    proxy_pass http://192.168.1.155:18080/.well-known/openid-configuration;
}

location = /.well-known/oauth-authorization-server/oauth {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /oauth;
    proxy_pass http://192.168.1.155:18080/.well-known/oauth-authorization-server;
}

location = /.well-known/openid-configuration/oauth {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /oauth;
    proxy_pass http://192.168.1.155:18080/.well-known/openid-configuration;
}

location ^~ /http {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /http;
    proxy_set_header X-Forwarded-OAuth-Prefix /oauth;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    proxy_pass http://192.168.1.155:18080;
}

location ^~ /oauth/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /oauth;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    rewrite ^/oauth/(.*)$ /$1 break;
    proxy_pass http://192.168.1.155:18080;
}
