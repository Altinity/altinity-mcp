image:
  repository: ghcr.io/altinity/altinity-mcp
  tag: "main"
  pullPolicy: IfNotPresent

service:
  annotations:
    edge-proxy.altinity.com/port-mapping: "443:tls-to-tcp:8080"
    edge-proxy.altinity.com/tls-server-name: welcome.ru

config:
  clickhouse:
    host: "clickhouse.example.com"
    port: 8443
    database: "default"
    username: "default"
    password: ""
    protocol: "http"
    limit: 0
    read_only: true

  server:
    transport: "http"
    openapi:
      enabled: true
      tls: true
    jwe:
      enabled: true
      jwe_secret_key: ""
      jwt_secret_key: ""
    oauth:
      enabled: true
      issuer: "https://welcome.ru/oauth"
      audience: "https://welcome.ru/http"
      public_resource_url: "https://welcome.ru/http"
      public_auth_server_url: "https://welcome.ru/oauth"
      protected_resource_metadata_path: "/.well-known/oauth-protected-resource"
      authorization_server_metadata_path: "/.well-known/oauth-authorization-server"
      openid_configuration_path: "/.well-known/openid-configuration"
      registration_path: "/register"
      authorization_path: "/authorize"
      callback_path: "/callback"
      token_path: "/token"
      upstream_issuer_allowlist:
        - "accounts.google.com"
        - "https://accounts.google.com"
      client_id: ""
      client_secret: ""
      token_url: "https://oauth2.googleapis.com/token"
      auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
      scopes:
        - "openid"
        - "email"
      required_scopes:
        - "openid"
      auth_code_ttl_seconds: 300
      access_token_ttl_seconds: 3600
      refresh_token_ttl_seconds: 2592000
      forward_to_clickhouse: false
      forward_access_token: false
      clear_clickhouse_credentials: false

  logging:
    level: "debug"
